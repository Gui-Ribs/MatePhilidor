plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'com.diffplug.spotless' version '7.0.4'
}

repositories {
    mavenCentral()
}

javafx {
    version = '23.0.1'
    modules = ['javafx.controls']
}

application {
    mainClass = 'InterfaceJogadorBoundary'
}

spotless {
    enforceCheck = false
    java {
        target 'src/**/*.java'
        eclipse()
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}
